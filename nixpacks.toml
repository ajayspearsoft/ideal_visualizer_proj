# Nixpacks Configuration (Force Refresh V2)
[phases.setup]
nixPkgs = ["nodejs_20", "python311", "python311Packages.pip", "gcc", "pkg-config", "libGL", "libGLU", "cmake", "zlib"]

[phases.install]
dependsOn = ["setup"]
cmds = [
  "npm ci",
  "python3 -m venv /opt/venv",
  "/opt/venv/bin/pip install --upgrade pip setuptools wheel",
  "cd backend && /opt/venv/bin/pip install --no-cache-dir -r requirements.txt"
]

[phases.build]
dependsOn = ["install"]
cmds = ["npm run build"]

[start]
cmd = "cd backend && /opt/venv/bin/python app.py"
