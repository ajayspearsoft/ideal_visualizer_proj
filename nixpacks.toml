[phases.setup]
nixPkgs = ["nodejs_20", "python311", "python311Packages.pip", "gcc", "pkg-config", "libGL", "libGLU", "cmake", "zlib"]

[phases.install]
cmds = [
  "npm ci",
  "python3 -m ensurepip || true",
  "python3 -m pip install --upgrade pip setuptools wheel",
  "cd backend && python3 -m pip install --no-cache-dir -r requirements.txt"
]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "cd backend && python3 app.py"
